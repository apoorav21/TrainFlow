name: TrainFlow
options:
  bundleIdPrefix: com.trainflow
  developmentLanguage: en

packages:
  amplify-swift:
    url: https://github.com/aws-amplify/amplify-swift
    from: 2.40.0

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.trainflow.app
    PRODUCT_NAME: TrainFlow
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SUPPORTED_PLATFORMS: iphoneos iphonesimulator
    TARGETED_DEVICE_FAMILY: '1'
    SUPPORTS_MACCATALYST: NO
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic

targets:
  TrainFlow:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: TrainFlow
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: amplify-swift
        product: Amplify
      - package: amplify-swift
        product: AWSCognitoAuthPlugin
      - target: TrainFlowWatch WatchKit App
        embed: true
        codeSign: false
      - sdk: WatchConnectivity.framework
    entitlements:
      path: TrainFlow/TrainFlow.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: TrainFlow/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: 6.0
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: TrainFlow reads your health data to display vitals, sleep, and fitness metrics.
        NSHealthUpdateUsageDescription: TrainFlow writes workout data to Apple Health.
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: LaunchScreen
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.trainflow.app
            CFBundleURLSchemes:
              - trainflow
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  TrainFlowWatch WatchKit App:
    type: application
    platform: watchOS
    deploymentTarget: '10.0'
    sources:
      - path: TrainFlowWatch
        excludes:
          - "Info.plist"
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trainflow.app.watchkitapp
        PRODUCT_NAME: TrainFlowWatch
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        WATCHOS_DEPLOYMENT_TARGET: '10.0'
        SUPPORTED_PLATFORMS: 'watchos watchsimulator'
        TARGETED_DEVICE_FAMILY: '4'
        SDKROOT: watchos
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: '5.0'
        LD_RUNPATH_SEARCH_PATHS: ['$(inherited)', '@executable_path/Frameworks']
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TrainFlow
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.trainflow.app
        INFOPLIST_KEY_NSHealthShareUsageDescription: 'TrainFlow reads your heart rate and workout data.'
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: 'TrainFlow writes workout data to Apple Health.'
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    entitlements:
      path: TrainFlowWatch/TrainFlowWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - sdk: WatchConnectivity.framework
      - sdk: HealthKit.framework

schemes:
  TrainFlow:
    build:
      targets:
        TrainFlow: all
        TrainFlowWatch WatchKit App: all
    run:
      config: Debug
    archive:
      config: Release

  TrainFlowWatch:
    build:
      targets:
        TrainFlowWatch WatchKit App: all
    run:
      config: Debug
    archive:
      config: Release
